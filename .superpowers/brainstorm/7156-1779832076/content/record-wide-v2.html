<h2>方案 B 加宽 — 光条更粗更长更明显</h2>

<div style="display:flex; gap:20px; align-items:flex-start; flex-wrap:wrap; justify-content:center;">

<!-- 120px -->
<div style="width:390px; background:#f5f0eb; border-radius:24px; overflow:hidden; font-family:system-ui,sans-serif; box-shadow:0 8px 40px rgba(0,0,0,0.15); min-height:600px; display:flex; flex-direction:column;">
  <div style="flex:1; padding:14px;">
    <div style="display:flex;gap:8px;margin-bottom:22px;"><div style="width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#e07b5a,#f0a58b);"></div><div style="max-width:70%;background:#fff;border-radius:6px 16px 16px 16px;padding:10px 14px;font-size:13px;color:#3c3c3c;">Hi I'm Emma!</div></div>
  </div>
  <div style="border-top:1px solid #e8e3dc; padding:10px 0; background:radial-gradient(ellipse at center, rgba(239,68,68,0.08) 0%, transparent 70%); display:flex; align-items:center; justify-content:center; gap:12px; height:48px; position:relative;">
    <div class="gl" style="width:120px;height:4px;background:linear-gradient(90deg, transparent, rgba(239,68,68,0.9), rgba(239,68,68,0.4));border-radius:2px;"></div>
    <div style="width:48px;height:48px;border-radius:50%;background:#ef4444;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(239,68,68,0.5), 0 0 40px rgba(239,68,68,0.2);flex-shrink:0;">
      <div style="width:12px;height:12px;background:#fff;border-radius:2px;"></div>
    </div>
    <div class="gr" style="width:120px;height:4px;background:linear-gradient(90deg, rgba(239,68,68,0.4), rgba(239,68,68,0.9), transparent);border-radius:2px;"></div>
  </div>
  <div style="font-size:9px;color:#999;text-align:center;padding-bottom:2px;">120px × 4px 粗光条</div>
</div>

<!-- 满宽 -->
<div style="width:390px; background:#f5f0eb; border-radius:24px; overflow:hidden; font-family:system-ui,sans-serif; box-shadow:0 8px 40px rgba(0,0,0,0.15); min-height:600px; display:flex; flex-direction:column;">
  <div style="flex:1; padding:14px;">
    <div style="display:flex;gap:8px;margin-bottom:22px;"><div style="width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#e07b5a,#f0a58b);"></div><div style="max-width:70%;background:#fff;border-radius:6px 16px 16px 16px;padding:10px 14px;font-size:13px;color:#3c3c3c;">Hi I'm Emma!</div></div>
    <div style="display:flex;justify-content:flex-end;margin-bottom:22px;"><div style="max-width:70%;background:#e07b5a;border-radius:16px 6px 16px 16px;padding:10px 14px;font-size:13px;color:#fff;">Hello!</div><div style="width:28px;height:28px;border-radius:50%;background:#d0d0d0;margin-left:8px;"></div></div>
  </div>
  <!-- 满宽 — 光条撑到两边 -->
  <div style="border-top:1px solid #e8e3dc; padding:10px 14px; background:radial-gradient(ellipse at center, rgba(239,68,68,0.10) 0%, transparent 70%); display:flex; align-items:center; justify-content:center; gap:8px; height:48px; position:relative;">
    <div style="position:absolute; inset:0; background:radial-gradient(ellipse at center, rgba(239,68,68,0.08) 0%, transparent 60%); pointer-events:none;"></div>
    <div class="gl" style="flex:1;height:4px;background:linear-gradient(90deg, transparent, rgba(239,68,68,0.9), rgba(239,68,68,0.5));border-radius:2px;"></div>
    <div style="width:48px;height:48px;border-radius:50%;background:#ef4444;display:flex;align-items:center;justify-content:center;box-shadow:0 0 24px rgba(239,68,68,0.6), 0 0 50px rgba(239,68,68,0.25);flex-shrink:0;z-index:1;">
      <div style="width:12px;height:12px;background:#fff;border-radius:2px;"></div>
    </div>
    <div class="gr" style="flex:1;height:4px;background:linear-gradient(90deg, rgba(239,68,68,0.5), rgba(239,68,68,0.9), transparent);border-radius:2px;"></div>
  </div>
  <div style="font-size:9px;color:#999;text-align:center;padding-bottom:2px;">满宽 flex:1 — 撑到两边 ✦ 推荐</div>
</div>

</div>

<style>
.gl { animation: gleft 0.7s ease-in-out infinite; }
.gr { animation: gright 0.7s ease-in-out infinite 0.2s; }
@keyframes gleft { 0%,100%{opacity:0.25} 50%{opacity:1} }
@keyframes gright { 0%,100%{opacity:0.25} 50%{opacity:1} }
</style>

    </div>
    <!-- 右光条 -->
    <div class="gright" style="width:70px;height:2.5px;background:linear-gradient(90deg, rgba(239,68,68,0.7), transparent);border-radius:2px;"></div>
  </div>
  <div style="font-size:9px;color:#999;text-align:center;padding:2px 0 6px;">标准 — 70px 光条</div>

<!-- 加宽版 -->

  <div style="border-top:1px solid #e8e3dc; padding:6px 0; background:linear-gradient(0deg, rgba(239,68,68,0.04) 0%, transparent 100%); display:flex; align-items:center; justify-content:center; gap:14px; height:48px; position:relative;">
    <div style="position:absolute; inset:0; background:radial-gradient(ellipse at center, rgba(239,68,68,0.06) 0%, transparent 70%); pointer-events:none;"></div>

    <div class="gwide-left" style="width:90px;height:2.5px;background:linear-gradient(90deg, transparent, rgba(239,68,68,0.8), rgba(239,68,68,0.4));border-radius:2px;"></div>

    <div style="width:48px;height:48px;border-radius:50%;background:#ef4444;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(239,68,68,0.5), 0 0 40px rgba(239,68,68,0.15);flex-shrink:0;z-index:1;">
      <div style="width:10px;height:10px;background:#fff;border-radius:2px;"></div>

    <!-- 右光条 — 加宽+呼吸 -->
